version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: industrial-rag-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: industrial_rag
      MYSQL_USER: rag_user
      MYSQL_PASSWORD: rag_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: industrial-rag-app
    restart: unless-stopped
    depends_on:
      - mysql
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: mysql+pymysql://rag_user:rag_password@mysql:3306/industrial_rag
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      UPLOAD_FOLDER: /data/uploads
      VECTOR_STORE_DIR: /data/vector_store
      CHAT_IMAGE_FOLDER: /data/chat_images
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      FLASK_DEBUG: "false"
      CHUNK_SIZE: 500
      CHUNK_OVERLAP: 50
      TOP_K: 3
    volumes:
      - app_data:/data

volumes:
  mysql_data:
  app_data:
